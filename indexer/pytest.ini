[pytest]
# Pytest configuration file
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options when running pytest with coverage
addopts = 
    --strict-markers
    --tb=short
    -ra
    --cov-config=.coveragerc

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    requires_db: marks tests that require database access
    requires_network: marks tests that require network access
    requires_bitcoin_node: marks tests that require a local Bitcoin node (RPC)

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test discovery
norecursedirs = .git .tox dist build *.egg venv .venv tools __pycache__

# Timeout
timeout = 300

# Environment variables for tests
env = 
    USE_TEST_TX_HEX=1
    TESTING=1
    USE_TEST_DB=1
    MOCK_DB=1