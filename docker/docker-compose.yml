services:
  db:
    image: mysql:8.4.0
    platform: ${DOCKER_PLATFORM}
    volumes:
      - ./db_data:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ../indexer/table_schema.sql:/docker-entrypoint-initdb.d/table_schema.sql
    restart: always
    env_file:
      - .env.mysql
    # environment:
    #   - MYSQL_DATABASE=${RDS_DATABASE:-btc_stamps}
    command: --bind-address=0.0.0.0 --innodb_data_file_path=ibdata1:10M:autoextend
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  indexer:
    build: 
      context: ../indexer
      dockerfile: Dockerfile
      args:
         PYTHON_VERSION: 3.12
         # Set to true if you need development dependencies
         INSTALL_DEV: ${INSTALL_DEV:-false}
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/indexer.conf
    volumes:
      - ../indexer:/usr/src/app
      - ../files:/usr/src/app/files
      - /var/log/supervisor:/var/log/supervisor
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../indexer/.env
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl status indexer | grep RUNNING || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
  app:
    build:
      context: ../app
    volumes:
      - ../files:/app/static/stamps
    ports:
      - "8080:8000"
    depends_on:
      - db
    env_file:
      - ../app/.env
      

volumes:
  db_data:
  files:
