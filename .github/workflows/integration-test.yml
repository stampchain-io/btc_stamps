name: Integration Tests

on:
  pull_request:
    branches: [dev, main]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    env:
      USE_TEST_TX_HEX: "1"
      TESTING: "1"
      USE_TEST_DB: "1"
      MOCK_DB: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "indexer/src/rust_parser -> target"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer

      - name: Download Test Blockchain Data
        run: |
          mkdir -p ./indexer/tests/data/blockchain
          # Add commands to download and extract test blockchain data snapshots
          echo "Using test blockchain data for offline testing"

      - name: Run Integration Tests
        run: poetry run check-integration
        working-directory: ./indexer
        env:
          PYTHONPATH: ${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer
          USE_TEST_BLOCKCHAIN_DATA: "1" 