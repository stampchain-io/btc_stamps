name: Bump Version
on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types: [closed]
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      versionType:
        description: 'Type of version to bump (major, minor, patch, build, release)'
        required: true
        default: 'patch'
      preRelease:
        description: 'Mark as a pre-release version? (true/false)'
        required: false
        default: 'false'

jobs:
  versioning:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)) && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    permissions:
      contents: write
      packages: write
      pull-requests: write
    env:
      GIT_USER_NAME: GitHub Action
      GIT_USER_EMAIL: action@github.com
      SKIP: 'false'
      NEW_VERSION: ''
      hash: ''
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check if last commit was made by GitHub Actions
        id: check_user
        run: |
          if git log -1 --pretty=format:'%ae' | grep -q "${{ env.GIT_USER_EMAIL }}"; then
            echo "Last commit was made by GitHub Actions. Skipping workflow."
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "Last commit was not made by GitHub Actions. Running workflow."
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Check for skip keyword
        id: check-skip
        run: |
          SKIP="${{ env.SKIP }}"
          
          # For PR merges, only check the PR title
          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ github.event.action }}" == "closed" ]] && [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            # Don't check commit messages for PRs, only the PR title
            PR_TITLE="${{ github.event.pull_request.title }}"
            if [[ "$PR_TITLE" == *"[skip-version]"* ]]; then
              SKIP=true
            fi
          
          # For direct pushes to branches, check the commit message
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            COMMIT_MESSAGE=$(git log -1 --pretty=%B | tr -d '\n')
            if [[ "$COMMIT_MESSAGE" == *"[skip-version]"* ]]; then
              SKIP=true
            fi
          fi
          
          echo "SKIP=$SKIP" >> $GITHUB_ENV

      - name: Set up Python
        if: env.SKIP == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        if: env.SKIP == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install bump2version

      - name: Configure Git
        if: env.SKIP == 'false'
        run: |
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git

      - name: Get current commit hash
        if: env.SKIP == 'false'
        id: get_commit
        run: printf 'hash=%s\n' "$(git rev-parse HEAD)" >> $GITHUB_ENV

      # NOTE: Cutting a production release (prod version bump on main, tag,
      # GitHub Release, and version-only sync-back to dev) is owned by the
      # dedicated release.yml "Cut Release" workflow, which releases via a PR to
      # main + tag (never a direct push to main, which the `main-req` ruleset
      # rejects with GH013). This workflow now only manages canary versions on
      # dev. See release.yml for the release runbook.

      - name: Handle PR merge to dev
        if: env.SKIP == 'false' && github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'dev'
        run: |
          # If merging from main to dev, convert production version to canary format
          if [[ "${{ github.head_ref }}" == "main" ]]; then
            CURRENT_VERSION=$(cat VERSION)
            if [[ "$CURRENT_VERSION" != *"+canary"* ]]; then
              # Convert production version (e.g., 1.9.0) to canary (1.9.0+canary.1)
              CANARY_VERSION="${CURRENT_VERSION}+canary.1"
              echo "Converting ${CURRENT_VERSION} to canary: ${CANARY_VERSION}"
              bump2version --new-version "${CANARY_VERSION}" --no-tag --verbose --allow-dirty release
            fi
            printf 'NEW_VERSION=%s\n' "$(cat VERSION)" >> $GITHUB_ENV
          fi

      - name: Bump version for dev push
        if: env.SKIP == 'false' && github.ref == 'refs/heads/dev' && github.event_name == 'push'
        run: |
          # Only bump build number if already in canary format
          # Use --no-tag to avoid tag collisions — canary tags are not consumed downstream
          if [[ "$(cat VERSION)" == *"+canary"* ]]; then
            bump2version build --no-tag --verbose --allow-dirty
            printf 'NEW_VERSION=%s\n' "$(cat VERSION)" >> $GITHUB_ENV
          fi

      - name: Commit and push changes if new version
        if: env.SKIP == 'false' && env.NEW_VERSION
        run: |
          # Canary bumps only ever land on dev here; the release path (main tag +
          # Release + sync-back) lives in release.yml. Never push tags from this
          # step — production tags are pushed by release.yml using the PAT.
          if [ "$(git rev-parse HEAD)" != "${{ env.hash }}" ]; then
            git push origin HEAD:${{ github.ref }}
          else
            echo "No new commit created, so no push."
          fi

  manual-versioning:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
    env:
      GIT_USER_NAME: GitHub Action
      GIT_USER_EMAIL: action@github.com
      NEW_VERSION: ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bump2version

      - name: Configure Git
        run: |
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git

      - name: Get current commit hash
        id: get_commit
        run: printf 'hash=%s\n' "$(git rev-parse HEAD)" >> $GITHUB_ENV
      
      - name: Bump version manually
        run: |
          bump2version ${{ github.event.inputs.versionType }} --verbose --allow-dirty
          printf 'NEW_VERSION=%s\n' "$(cat VERSION)" >> $GITHUB_ENV
  
      - name: Commit and push changes if new version
        if: env.NEW_VERSION
        run: |
          if [ "$(git rev-parse HEAD)" != "${{ env.hash }}" ]; then
            git push origin HEAD:${{ github.ref }}
            git push origin --tags
          else
            echo "No new commit created, so no push."
          fi

      - name: Create Release
        if: env.NEW_VERSION
        id: create_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.NEW_VERSION }}
          name: Release ${{ env.NEW_VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event.inputs.preRelease }}