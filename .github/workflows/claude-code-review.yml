name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Only run on indexer changes to avoid unnecessary reviews
    paths:
      - "indexer/**/*.py"
      - "indexer/**/*.rs"
      - "indexer/**/*.toml"
      - "indexer/**/*.lock"

jobs:
  claude-review:
    # Skip if PR title contains [skip-review], if it's from automated bots, or for version bumps
    if: |
      !contains(github.event.pull_request.title, '[skip-review]') &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'github-actions' &&
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.head_commit.message, 'Bump version') &&
      !contains(github.event.head_commit.message, 'canary.')
    
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write  # Needed to post review comments
      issues: read
      id-token: write  # Required for OIDC authentication
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use default behavior - Claude action handles PR context internally
          fetch-depth: 0
          # Checkout PR head for analysis
          ref: ${{ github.event.pull_request.head.sha }}
      
      # Debug step removed - no longer needed with stable version
      # Build steps removed - Claude only needs source code for review, not built artifacts

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v0.0.52
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Use stable model version
          model: "claude-sonnet-4-20250514"
          
          # Standard review prompt
          direct_prompt: |
            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage
            
            Be constructive and helpful in your feedback.

          # Allow fresh reviews on each push
          use_sticky_comment: false
          
          # No tools needed - Claude performs static code analysis only

