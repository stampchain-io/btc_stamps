name: Build Tests

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: 'development'
    outputs:
      test_status:
        description: "Test execution status"
        value: ${{ jobs.test-build.outputs.status }}

jobs:
  setup:
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    uses: ./.github/workflows/reusable-setup.yml
    with:
      python-version: ${{ matrix.python-version }}

  test-build:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.test.outputs.test_status }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Create Python module structure
        run: |
          mkdir -p indexer/src/btc_stamps_parser
          touch indexer/src/btc_stamps_parser/__init__.py

      - name: Run Build Test
        id: test
        working-directory: ./indexer
        run: |
          ./test-local.sh
          echo "test_status=success" >> $GITHUB_OUTPUT

      - name: Run Rust parser tests
        working-directory: ./indexer
        run: poetry run pytest tests/test_rust_parser.py -v