name: Build Tests

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: 'development'
    outputs:
      test_status:
        description: "Test execution status"
        value: ${{ jobs.test-build.outputs.status }}

jobs:
  test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.12']  # Test multiple versions
    outputs:
      status: ${{ steps.test.outputs.test_status }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Create Python module structure
        run: |
          mkdir -p indexer/src/btc_stamps_parser
          touch indexer/src/btc_stamps_parser/__init__.py

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "indexer/src/rust_parser -> target"

      - name: Install Maturin
        run: pip install maturin

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
        env:
          POETRY_HOME: ${{ github.workspace }}/.poetry

      - name: Add Poetry to PATH
        run: echo "${{ github.workspace }}/.poetry/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies using Poetry
        run: |
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer

      - name: Build Rust parser
        working-directory: ./indexer
        run: maturin develop --release

      - name: Run Build Test
        id: test
        working-directory: ./indexer
        run: |
          ./test-local.sh
          echo "test_status=success" >> $GITHUB_OUTPUT

      - name: Run Rust parser tests
        working-directory: ./indexer
        run: poetry run pytest tests/test_rust_parser.py -v