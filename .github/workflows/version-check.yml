name: Version Format Check

# Trunk model (main is the single primary branch): the VERSION file must always
# be either a clean release version `X.Y.Z` or the between-releases development
# marker `X.Y.Z+dev.N`. There is no more dev/canary branch, so the old
# per-branch (canary vs prod) validation is gone.
#
#   X.Y.Z         a release commit / freshly-cut release on main
#   X.Y.Z+dev.N   the normal between-releases state on main (default: +dev.0)
#
# `X.Y.Z+dev.N` matches indexer/src/config.py's VERSION_STRING parser regex
# (release="dev", build=N), so update_version_globals() and the check.py
# minimum-version comparison (which only look at MAJOR/MINOR/REVISION) are
# unaffected.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate version format
        run: |
          # On pull_request events GITHUB_REF is refs/pull/N/merge, which is not
          # a branch ref; use the PR base branch so PRs are actually validated
          # (kept from the previous base_ref fix). For push events use the ref.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          VERSION="$(cat VERSION)"

          # Accept a clean release version or the between-releases dev marker.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\+dev\.[0-9]+)?$ ]]; then
            echo "::error::VERSION '$VERSION' is invalid for branch '$BRANCH'. Expected a clean 'X.Y.Z' or the development marker 'X.Y.Z+dev.N'."
            exit 1
          fi

          echo "Version format OK for branch '$BRANCH': $VERSION"
