name: Version Format Check

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate version format
        run: |
          # On pull_request events GITHUB_REF is refs/pull/N/merge, which matches
          # neither "dev" nor "main" and made this check a silent no-op on PRs.
          # Use the PR's base branch for pull_request events so dev PRs are
          # validated as canary and main PRs as prod; keep push behavior as-is.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH=${GITHUB_REF#refs/heads/}
          fi
          VERSION=$(cat VERSION)
          
          if [[ "$BRANCH" == "dev" && "$VERSION" != *"+canary"* ]]; then
            echo "::error::Dev branch must use canary version format (e.g., 1.0.0+canary.1)"
            exit 1
          fi

          if [[ "$BRANCH" == "main" && "$VERSION" == *"+canary"* ]]; then
            echo "::error::Main branch cannot use canary version format (e.g., 1.0.0)"
            exit 1
          fi

          echo "Version format is correct for branch $BRANCH" 