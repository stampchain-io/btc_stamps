name: Version Format Check

# Trunk model (main is the single primary branch): the VERSION file must always
# be a clean release version `X.Y.Z`. main sits on the last shipped release and
# is bumped in place by the "Cut Release" workflow — there is NO `+dev.N`
# development marker. There is no dev/canary branch, so the old per-branch
# (canary vs prod) validation is gone.
#
#   X.Y.Z   the last shipped release; main stays here until the next release cut

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate version format
        run: |
          # On pull_request events GITHUB_REF is refs/pull/N/merge, which is not
          # a branch ref; use the PR base branch so PRs are actually validated
          # (kept from the previous base_ref fix). For push events use the ref.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          VERSION="$(cat VERSION)"

          # main must always carry a clean release version X.Y.Z (no +dev marker).
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION '$VERSION' is invalid for branch '$BRANCH'. Expected a clean release version 'X.Y.Z' (no '+dev' marker)."
            exit 1
          fi

          echo "Version format OK for branch '$BRANCH': $VERSION"
