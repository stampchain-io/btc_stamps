name: Docker Auto-Publish

on:
  push:
    branches:
      - main
      - dev
    # Release version tags (X.Y.Z, no v-prefix, no +canary). A release commit
    # always bumps indexer/pyproject.toml (indexer/**), so the paths filter below
    # is satisfied for the tagged commit and the release build runs.
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    paths:
      - 'indexer/**'
      - 'docker/**'
      - '.github/workflows/docker-auto-publish.yml'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      
      - name: Extract version from pyproject.toml
        id: get-version
        run: |
          if [ -f "indexer/pyproject.toml" ]; then
            VERSION=$(grep -m 1 'version = ' indexer/pyproject.toml | sed -E 's/version = "([^"]+)"/\1/')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Found version: $VERSION"
          else
            echo "VERSION=unknown" >> $GITHUB_OUTPUT
            echo "pyproject.toml not found"
          fi

      - name: Set Docker tag
        id: set-tag
        run: |
          echo "SHA_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Release build (triggered by an X.Y.Z tag push): this is the ONLY
            # path that publishes the moving :latest pointer and the clean
            # :X.Y.Z release image, and the only path that rewrites the Docker
            # Hub description. A plain push to main must never overwrite these.
            RELEASE_VERSION="${GITHUB_REF#refs/tags/}"
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "TAG=latest" >> $GITHUB_OUTPUT
            echo "VERSION_TAG=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          else
            # Branch push: publish a staging pointer only (never :latest, never a
            # clean X.Y.Z tag). main -> :edge, dev -> :dev.
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
            if [[ "$BRANCH_NAME" == "main" ]]; then
              echo "TAG=edge" >> $GITHUB_OUTPUT
            else
              echo "TAG=dev" >> $GITHUB_OUTPUT
            fi
            # Sanitize version for Docker tag (replace + with -). Branch versions
            # carry +canary, so this can never collide with a clean X.Y.Z tag.
            SANITIZED_VERSION=$(echo "${{ steps.get-version.outputs.VERSION }}" | sed 's/+/-/g')
            echo "VERSION_TAG=${SANITIZED_VERSION}-${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi
      
      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: btcstamps
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Clean up old Docker images
        run: |
          # Generate a temporary access token
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            -d '{"username": "btcstamps", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          # Get list of SHA tags (excluding latest and dev)
          echo "Listing tags to prune..."
          TAGS=$(curl -s -H "Authorization: Bearer $TOKEN" \
                "https://hub.docker.com/v2/repositories/btcstamps/indexer/tags?page_size=100" | \
                jq -r '.results[] | select(.name | test("^[a-f0-9]{7}$")) | .name' | \
                sort)
          
          # Count tags
          TAG_COUNT=$(echo "$TAGS" | wc -l)
          
          # Keep only 5 most recent SHA tags
          if [ "$TAG_COUNT" -gt 5 ]; then
            # Calculate how many to delete
            DELETE_COUNT=$((TAG_COUNT - 5))
            TAGS_TO_DELETE=$(echo "$TAGS" | head -n "$DELETE_COUNT")
            
            echo "Found $TAG_COUNT SHA tags, deleting $DELETE_COUNT older tags"
            
            # Delete old tags
            for TAG in $TAGS_TO_DELETE; do
              echo "Deleting tag: $TAG"
              curl -s -X DELETE -H "Authorization: Bearer $TOKEN" \
                "https://hub.docker.com/v2/repositories/btcstamps/indexer/tags/$TAG/"
            done
          else
            echo "Only $TAG_COUNT SHA tags found, no pruning needed"
          fi
      
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./indexer
          push: true
          tags: |
            btcstamps/indexer:${{ steps.set-tag.outputs.TAG }}
            btcstamps/indexer:${{ steps.set-tag.outputs.SHA_TAG }}
            btcstamps/indexer:${{ steps.set-tag.outputs.VERSION_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'btcstamps/indexer:${{ steps.set-tag.outputs.TAG }}'
          format: 'table'
          exit-code: '0'  # Don't fail the build, just report
          severity: 'HIGH,CRITICAL'
          skip-files: 'app/bootstrap/srcbackground.csv,/usr/src/app/files/**'

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77 # v4
        if: steps.set-tag.outputs.IS_RELEASE == 'true'
        with:
          username: btcstamps
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: btcstamps/indexer
          short-description: "Bitcoin Stamps Indexer - Official docker image"
          readme-filepath: ./indexer/README.md 