name: Cut Release

# Hands-off production release for btc_stamps — TRUNK model (main is the single
# primary branch). There is no dev branch and no content sync: main already IS
# the trunk, so a release is just "bump the version, tag it, publish it".
#
# Versioning model:
#   * main ALWAYS sits on a clean release version `X.Y.Z` — the last shipped
#     release (e.g. after shipping 1.9.2, main stays at `1.9.2`). There is NO
#     `+dev.N` development marker; main is not reopened after a release.
#   * Cutting a release applies the requested bump level to main's current
#     `X.Y.Z` and freezes the new clean `X.Y.Z` (e.g. patch 1.9.2 -> 1.9.3,
#     minor -> 1.10.0, major -> 2.0.0). main then stays there until the next cut.
#
# The `main-req` ruleset requires status checks on refs/heads/main with an empty
# bypass list, so a direct `git push origin HEAD:main` of a version commit is
# rejected (GH013). Those checks CAN pass on a pull request, so the version
# change goes through a PR to main + auto-merge, never a direct push.
#
#   prepare  (manual "Cut Release", input: bump=major|minor|patch)
#     -> compute the next clean X.Y.Z from main's current X.Y.Z + bump level
#     -> create release/vX.Y.Z off main with the 4 version files set to X.Y.Z
#     -> open a [skip-version] PR to main and enable squash auto-merge
#        (merges once the required checks are green)
#
#   finalize (release/* PR merged into main)
#     -> tag X.Y.Z (no v-prefix) on the merge commit, pushed with the PAT so
#        tag-triggered workflows (docker-auto-publish release build) fire
#     -> create the "Release X.Y.Z" GitHub Release
#     (no reopen step — main remains on the clean X.Y.Z it was just bumped to)
#
# Tags are pushed with secrets.PAT on purpose: tags pushed with GITHUB_TOKEN do
# not trigger downstream Actions. Rulesets target refs/heads/main, not tags, so
# the tag push is not ruleset-blocked. Auto-merge is enabled with the PAT so the
# eventual squash-merge emits a pull_request event that triggers finalize.
#
# The version files are the 4 mirrored version carriers (VERSION,
# indexer/pyproject.toml, indexer/src/config.py VERSION_STRING, and
# .bumpversion.cfg current_version). prepare computes the target with plain bash
# and writes all 4 with bump2version's explicit `--new-version` + an inert
# `patch` carrier, so all carriers stay consistent (bump2version updates
# current_version in .bumpversion.cfg too) without relying on part-increment
# semantics.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Release version bump level'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
  pull_request:
    types: [closed]
    branches:
      - main

env:
  GIT_USER_NAME: GitHub Action
  GIT_USER_EMAIL: action@github.com

jobs:
  # Manual trigger: open the release PR to main and let it auto-merge.
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bump2version

      - name: Configure Git
        run: |
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git

      - name: Compute release version and create release branch
        id: version
        run: |
          # main carries a clean `<last>` X.Y.Z; apply the requested bump level.
          # (The `%%+*` strip is a harmless no-op safeguard if a marker slips in.)
          CURRENT="$(cat VERSION)"
          BASE="${CURRENT%%+*}"
          if [[ ! "$BASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::main VERSION '$CURRENT' does not have a clean X.Y.Z base"
            exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "$BASE"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "::error::Unknown bump level '${{ github.event.inputs.bump }}'"; exit 1 ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          if [[ ! "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Computed release version '$NEW_VERSION' is not a clean X.Y.Z"
            exit 1
          fi
          RELEASE_BRANCH="release/v${NEW_VERSION}"
          git checkout -B "${RELEASE_BRANCH}" main
          # Explicit --new-version + inert `patch` carrier: writes the clean
          # X.Y.Z to all 4 version files and commits (commit = True in the cfg).
          bump2version --new-version "${NEW_VERSION}" \
            --no-tag --allow-dirty --verbose \
            --message 'chore: release {new_version} [skip-version]' \
            patch
          FROZEN="$(cat VERSION)"
          if [[ "$FROZEN" != "$NEW_VERSION" ]]; then
            echo "::error::Version files were set to '$FROZEN', expected '$NEW_VERSION'"
            exit 1
          fi
          git push origin "${RELEASE_BRANCH}"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_BRANCH=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Open release PR to main and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.NEW_VERSION }}"
          RELEASE_BRANCH="${{ steps.version.outputs.RELEASE_BRANCH }}"
          # [skip-version] documents that this PR must not trigger any version
          # automation (there is no per-push bump in the trunk model).
          PR_URL=$(gh pr create \
            --base main \
            --head "${RELEASE_BRANCH}" \
            --title "chore: release ${NEW_VERSION} [skip-version]" \
            --body "Automated production release cut by the Cut Release workflow.

          Freezes the version files to a clean \`${NEW_VERSION}\`. Once the required checks pass and this squash-merges, the finalize job tags \`${NEW_VERSION}\` on main and publishes the \"Release ${NEW_VERSION}\" GitHub Release (which triggers the signed Docker release build). main then stays on \`${NEW_VERSION}\`.")
          echo "Opened release PR: $PR_URL"
          gh pr merge "$PR_URL" --squash --auto \
            || echo "Auto-merge unavailable — merge ${PR_URL} manually (admin) once checks are green"

  # Runs when a release/* PR is merged into main: tag + publish the release.
  finalize:
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && github.event.pull_request.base.ref == 'main'
      && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git

      - name: Tag release
        id: tag
        run: |
          NEW_VERSION="$(cat VERSION)"
          if [[ ! "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::main is at '$NEW_VERSION' (not a clean X.Y.Z); refusing to tag"
            exit 1
          fi
          # No v-prefix (matches .bumpversion.cfg tag_name = {new_version}).
          # Pushed with the PAT so tag-triggered workflows (docker-auto-publish)
          # fire; rulesets target refs/heads/main only, so tag pushes are allowed.
          if git ls-remote --exit-code --tags origin "refs/tags/${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Tag ${NEW_VERSION} already exists on origin, skipping tag push"
          else
            git tag "${NEW_VERSION}" "${{ github.event.pull_request.merge_commit_sha }}"
            git push origin "${NEW_VERSION}"
          fi
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.NEW_VERSION }}
          name: Release ${{ steps.tag.outputs.NEW_VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
