name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  # Rust build & checks first (not matrix)
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'main')) || github.event_name == 'workflow_dispatch'
    env:
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy
      - name: Cache Rust dependencies (Save + Restore)
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-${{ runner.os }}-${{ hashFiles('indexer/src/rust_parser/rust-toolchain') }}-${{ hashFiles('indexer/src/rust_parser/Cargo.lock') }}
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Run Rust Checks
        working-directory: ./indexer
        run: poetry run check-rust

  # Code Quality & Unit Tests across Python versions
  code-quality:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    env:
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy
      - name: Cache Rust dependencies (Restore Only)
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-${{ runner.os }}-${{ hashFiles('indexer/src/rust_parser/rust-toolchain') }}-${{ hashFiles('indexer/src/rust_parser/Cargo.lock') }}
          save-if: ${{ false }}
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Check for debug flags
        run: |
          if grep -qi "DEBUG_SKIP_REBUILD_BALANCES = True" ./indexer/.env; then
            echo "::error::DEBUG_SKIP_REBUILD_BALANCES is set to True. This should be False in production code."
            exit 1
          fi
          echo "Debug flag check passed"
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer" >> $GITHUB_ENV
      - name: Run Code & Unit Tests
        working-directory: ./indexer
        run: poetry run check-code

  # Integration tests that don't require Bitcoin node
  integration:
    name: Integration Tests (No Bitcoin Node)
    runs-on: ubuntu-latest
    needs: rust
    if: (github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'main')) || github.event_name == 'workflow_dispatch'
    env:
      PYTHONPATH: ${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy
      - name: Cache Rust dependencies (Restore Only)
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-${{ runner.os }}-${{ hashFiles('indexer/src/rust_parser/rust-toolchain') }}-${{ hashFiles('indexer/src/rust_parser/Cargo.lock') }}
          save-if: ${{ false }}
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Run Integration Tests (excluding Bitcoin node tests)
        working-directory: ./indexer
        run: |
          # Run integration tests that work with mocks or external APIs
          # Exclude only tests that require a local Bitcoin node
          poetry run pytest -m "integration and not requires_bitcoin_node" -v --tb=short
