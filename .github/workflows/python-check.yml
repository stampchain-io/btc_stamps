name: Python Check

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  python-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    env:
      USE_TEST_TX_HEX: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Check for debug flags
        run: |
          # Check for DEBUG_SKIP_REBUILD_BALANCES
          if grep -qi "DEBUG_SKIP_REBUILD_BALANCES = True" ./indexer/.env; then
            echo "::error::DEBUG_SKIP_REBUILD_BALANCES is set to True. This should be False in production code."
            exit 1
          fi
          
          echo "Debug flag check passed"
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Cache Poetry
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Update pip and setuptools
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev
          
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
        env:
          POETRY_HOME: ${{ github.workspace }}/.poetry
        working-directory: ./indexer
          
      - name: Add Poetry to PATH
        run: echo "${{ github.workspace }}/.poetry/bin" >> $GITHUB_PATH

      - name: Install dependencies using Poetry
        run: |
          poetry config virtualenvs.create false
          poetry install
        working-directory: ./indexer

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer" >> $GITHUB_ENV

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "indexer/src/rust_parser -> target"

      - name: Install Maturin
        run: pip install maturin

      - name: Build Rust parser
        working-directory: ./indexer
        run: maturin develop --release

      - name: Check import order with isort
        run: poetry run isort . --check-only
        working-directory: ./indexer

      - name: Format check with Black
        run: poetry run black --check . --config=pyproject.toml
        working-directory: ./indexer

      - name: Lint with flake8
        run: |
          poetry run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        working-directory: ./indexer

      - name: Check Rust formatting
        working-directory: ./indexer/src/rust_parser
        run: cargo fmt -- --check

      - name: Run Rust clippy
        working-directory: ./indexer/src/rust_parser
        run: cargo clippy -- -D warnings

      - name: Security check with Bandit
        run: poetry run task bandit
        working-directory: ./indexer

      - name: Check with mypy
        run:  poetry run mypy . --explicit-package-bases 
        working-directory: ./indexer
        
      # - name: Check Dependencies for Vulnerabilities
      #   run: poetry run run_safety
      #   working-directory: ./indexer

      - name: Run STAMP/SRC-20 Validations
        run: |
          poetry run python3 -m unittest discover -s . -p "test_src20.py"
        working-directory: ./indexer
          
      - name: Run check_format Validations
        run: |
          poetry run python3 -m unittest discover -s . -p "test_check_format.py"
        working-directory: ./indexer
          
      - name: Run ARC4  Validations
        run: |
          poetry run python3 -m unittest discover -s . -p "test_arc4.py"
        working-directory: ./indexer
