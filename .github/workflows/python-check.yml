name: CI

on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  # Rust build & checks first (not matrix)
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    env:
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "indexer/src/rust_parser -> target"
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Run Rust Checks
        working-directory: ./indexer
        run: poetry run check-rust

  # Code Quality & Unit Tests across Python versions
  code-quality:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    needs: rust
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    env:
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "indexer/src/rust_parser -> target"
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Check for debug flags
        run: |
          if grep -qi "DEBUG_SKIP_REBUILD_BALANCES = True" ./indexer/.env; then
            echo "::error::DEBUG_SKIP_REBUILD_BALANCES is set to True. This should be False in production code."
            exit 1
          fi
          echo "Debug flag check passed"
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer" >> $GITHUB_ENV
      - name: Run Code & Unit Tests
        working-directory: ./indexer
        run: poetry run check-code

  # Integration tests once after rust job
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: rust
    env:
      PYTHONPATH: ${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "indexer/src/rust_parser -> target"
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Run Integration Tests
        working-directory: ./indexer
        run: poetry run check-integration
