name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  # Rust build & checks first (not matrix)
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'main')) || github.event_name == 'workflow_dispatch'
    env:
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies (Save + Restore)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: rust-${{ runner.os }}-${{ hashFiles('indexer/src/rust_parser/rust-toolchain.toml') }}-${{ hashFiles('indexer/src/rust_parser/Cargo.lock') }}
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Run Rust Checks
        working-directory: ./indexer
        run: poetry run check-rust

  # Code Quality & Unit Tests across Python versions
  code-quality:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.13 runs here (code must still import/unit-test cleanly) but is NOT
        # consensus-validated — it diverges from prod consensus (base64/binascii
        # strictness); see #871. Consensus is gated on 3.10-3.12 only
        # (reparse-validate.yml). Do not infer 3.13 consensus support from a
        # green unit-test run here.
        python-version: ['3.10', '3.11', '3.12', '3.13']
    env:
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies (Restore Only)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: rust-${{ runner.os }}-${{ hashFiles('indexer/src/rust_parser/rust-toolchain.toml') }}-${{ hashFiles('indexer/src/rust_parser/Cargo.lock') }}
          save-if: ${{ false }}
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Verify poetry.lock is in sync with pyproject.toml
        working-directory: ./indexer
        run: poetry check --lock
      - name: Check for debug flags
        run: |
          if grep -qi "DEBUG_SKIP_REBUILD_BALANCES = True" ./indexer/.env; then
            echo "::error::DEBUG_SKIP_REBUILD_BALANCES is set to True. This should be False in production code."
            exit 1
          fi
          echo "Debug flag check passed"
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer" >> $GITHUB_ENV
      - name: Run Code & Unit Tests
        working-directory: ./indexer
        run: poetry run check-code

  # Integration tests that don't require Bitcoin node
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: rust
    if: (github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'main')) || github.event_name == 'workflow_dispatch'
    env:
      PYTHONPATH: ${{ github.workspace }}/indexer/src:${{ github.workspace }}/indexer
      USE_TEST_TX_HEX: '1'
      TESTING: '1'
      USE_TEST_DB: '1'
      MOCK_DB: '1'
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies (Restore Only)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: rust-${{ runner.os }}-${{ hashFiles('indexer/src/rust_parser/rust-toolchain.toml') }}-${{ hashFiles('indexer/src/rust_parser/Cargo.lock') }}
          save-if: ${{ false }}
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 2.1.1
          poetry config virtualenvs.in-project true
          poetry install
        working-directory: ./indexer
      - name: Build Rust parser for integration tests
        working-directory: ./indexer
        run: |
          # Install maturin and build the Rust parser
          poetry run pip install maturin --quiet
          cd src/rust_parser && poetry run maturin develop --release
      - name: Run Integration Tests (excluding Bitcoin node tests)
        working-directory: ./indexer
        run: |
          # Run integration tests that work with mocks or external APIs
          # Exclude only tests that require a local Bitcoin node
          poetry run pytest -m "integration and not requires_bitcoin_node" -v --tb=short

  # Dedicated, always-present consensus gate for the Python 3.13 base64/binascii
  # divergence (#871, #907). The broad "Code Quality & Unit Tests (3.13)" matrix
  # leg also exercises this test, but this job gives a FIXED, isolated, requireable
  # status context that is fast (no indexer/Rust build — the detection test only
  # needs base64/os/sys/pytest) and runs on every PR to main/dev.
  #
  # The test is a STRICT xfail on 3.13 (b64decode must reject the block-783775
  # non-canonical payload): green while 3.13 keeps diverging as documented, RED if
  # 3.13 ever decodes it again (xpass) — the signal to revisit #871.
  python313-consensus-gate:
    name: Python 3.13 Consensus Divergence Gate
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && (github.base_ref == 'dev' || github.base_ref == 'main')) || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run Python 3.13 base64 consensus-divergence detection test
        # -o addopts="" drops the repo pytest addopts (--cov-config etc.) and
        # --noconftest skips indexer/tests/conftest.py (which imports index_core)
        # so this stays a zero-dependency run of just the detection test.
        run: python -m pytest indexer/tests/test_python313_base64_regression.py -o addopts="" --noconftest -v
