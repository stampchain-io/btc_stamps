# ⚠️ DEPRECATED — superseded by docker-compose.yml + docker-compose.override.yml.
#
# This file is intentionally LEFT IN PLACE: the live from-genesis validation
# reindex was started against it and its restart commands still reference it.
# Do NOT delete or adopt the new base+override topology until that run completes
# and the maintainer approves. New work should target docker-compose.yml.
services:
  mysql:
    env_file:
      - ${ENV_FILE:-.env.local}
    profiles: ["with-db"]
    image: mysql:8.4
    command: >
      --bind-address=0.0.0.0
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=3G
      --tmp-table-size=268435456
      --max-heap-table-size=268435456
      --mysql-native-password=ON
    volumes:
      - ./db_data:/var/lib/mysql
      - ./indexer/table_schema.sql:/docker-entrypoint-initdb.d/table_schema.sql
    environment:
      - MYSQL_DATABASE=${RDS_DATABASE:-btc_stamps}
      - MYSQL_ROOT_PASSWORD=${RDS_PASSWORD:-root}
      - MYSQL_USER=${RDS_USER:-admin}
      - MYSQL_PASSWORD=${RDS_PASSWORD}
      - MYSQL_ROOT_HOST=%
    ports:
      - "3306:3306"
    # Indexer used to start before schema_init finished, fail its first 3
    # pymysql.connect() calls with "Lost connection during query", and then
    # hang on later connects (libmysqlclient state corruption). Healthcheck
    # gates the indexer's start until mysqladmin ping AND the init schema
    # have completed.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent && mysql -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD -e 'SHOW TABLES' $$MYSQL_DATABASE | grep -q blocks"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.12
        INSTALL_DEV: "true"
    image: ${IMAGE_NAME:-btc_stamps/indexer:local-dev}
    labels:
      com.docker.compose.environment: "local-development"
      com.docker.compose.project: "indexer-local"
    network_mode: ${NETWORK_MODE:-host}
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    environment:
      - ENV_FILE=${ENV_FILE:-.env.local}
      - DEBUG=1
      - RDS_DATABASE=${RDS_DATABASE:-btc_stamps}
      - RDS_PASSWORD=${RDS_PASSWORD:-root}
      - RDS_USER=${RDS_USER}
      - RDS_PASSWORD=${RDS_PASSWORD}
      - RDS_ROOT_HOST=%
      - MYSQL_DATABASE=${RDS_DATABASE:-btc_stamps}
      - MYSQL_ROOT_PASSWORD=${RDS_PASSWORD:-root}
      - MYSQL_USER=${RDS_USER}
      - MYSQL_PASSWORD=${RDS_PASSWORD}
      - MYSQL_ROOT_HOST=%
      - REPARSE_MODE=${REPARSE_MODE:-false}
      - SNAPSHOT_PATH=${SNAPSHOT_PATH:-/app/snapshots/reference_hashes.json}
      - REPARSE_STAGING_DB=${REPARSE_STAGING_DB:-btc_stamps_staging}
    ports:
      - "3306:3306"
    volumes:
      - ./snapshots:/app/snapshots:ro
    # $$ escapes from compose interpolation so REPARSE_MODE is dereferenced at runtime.
    command: ["sh", "-c", "if [ \"$$REPARSE_MODE\" = \"true\" ]; then exec poetry run reparse; else exec poetry run indexer; fi"]